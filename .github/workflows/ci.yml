name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          pkg-config \
          libpulse-dev \
          libjack-jackd2-dev \
          libpipewire-0.3-dev \
          libspa-0.2-dev

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy linting
      run: cargo clippy --all-targets -- -D warnings

    - name: Run tests
      run: cargo test --verbose
      env:
        # Disable audio tests in CI environment
        RUST_TEST_THREADS: 1
        BEEP_VOLUME: 0.0
        CI: true

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit

  build_artifact:
    name: Build Artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build with Vulkan support (Docker)
      run: |
        docker build -f Dockerfile.build-vulkan -t waystt-builder .
        docker run --rm -v $(pwd):/out waystt-builder
        mv waystt-vulkan waystt-linux-x86_64

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: waystt-linux-x86_64
        path: waystt-linux-x86_64